<app-navbar></app-navbar>

<section class="blog-hero">
  <div class="container">
    <h1>Nayan Tech Blog</h1>
    <p>Insights, updates, and guidance on HR, staffing, and workforce management.</p>
  </div>
</section>

<section class="blog-list">
  <div class="container">
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let post of posts">
        <div class="blog-card">
          <img [src]="post.image" [alt]="post.title">
          <div class="blog-card-body">
            <span class="blog-date">{{ post.date }}</span>
            <h3>{{ post.title }}</h3>
            <p>{{ post.excerpt }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
