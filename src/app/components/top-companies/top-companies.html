<section class="py-5">

<div class="container">

<div class="text-center mb-5">

<h2 class="fw-bold">

Top Hiring Companies

</h2>

<p class="text-muted">

Join thousands of professionals working with India's leading employers.

</p>

</div>

<div class="row g-4">

<div
class="col-lg-3 col-md-4 col-sm-6"
*ngFor="let company of companies">

<div class="company-card">

<img
[src]="company.logo"
class="company-logo"
[alt]="company.name">

<h5>

{{company.name}}

</h5>

<p>

{{company.jobs}} Open Jobs

</p>

<button class="btn btn-outline-primary">

View Jobs

</button>

</div>

</div>

</div>

</div>

</section>
