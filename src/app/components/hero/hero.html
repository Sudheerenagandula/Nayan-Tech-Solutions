<section class="hero-section">

  <div class="hero-slideshow" [style.transform]="'translateX(-' + (currentSlide * (100 / slides.length)) + '%)'">
    <div
      class="hero-slide"
      *ngFor="let slide of slides; let i = index"
      [style.background-image]="'url(' + slide.image + ')'">
    </div>
  </div>

  <div class="hero-overlay"></div>

  <button class="hero-arrow hero-arrow-left" (click)="goToPrevious()" aria-label="Previous slide">
    <span>&#10094;</span>
  </button>
  <button class="hero-arrow hero-arrow-right" (click)="goToNext()" aria-label="Next slide">
    <span>&#10095;</span>
  </button>

  <ng-container *ngFor="let slide of slides; let i = index">
    <div
      class="hero-content"
      [class.hero-content--center]="slide.align === 'center'"
      [class.hero-content--left]="slide.align === 'left'"
      *ngIf="i === currentSlide">

      <div class="hero-ghost-text">{{ slide.ghostText }}</div>

      <h1 class="hero-heading">
        <span
          class="word-fall"
          *ngFor="let word of splitWords(slide.heading); let wi = index"
          [style.animation-delay.ms]="wi * 130">{{ word }}&nbsp;</span>
      </h1>

      <p class="hero-para">
        <span
          class="word-fall"
          *ngFor="let word of splitWords(slide.text); let wi = index"
          [style.animation-delay.ms]="250 + wi * 60">{{ word }}&nbsp;</span>
      </p>

      <div class="hero-actions" #revealEl [style.animation-delay.ms]="250 + splitWords(slide.text).length * 60 + 200">
        <a [href]="slide.ctaLink || '#'" class="btn-hero">{{ slide.ctaText }}</a>
      </div>
    </div>
  </ng-container>

  <div class="hero-dots">
    <span
      *ngFor="let slide of slides; let i = index"
      class="hero-dot"
      [class.active]="i === currentSlide"
      (click)="goToSlide(i)">
    </span>
  </div>

  <button class="hero-scroll-indicator" (click)="scrollToNextSection()" aria-label="Scroll down">
    <span class="hero-scroll-chevron"></span>
  </button>

  <svg class="hero-curve" viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,80 Q720,170 1440,80 L1440,120 L0,120 Z" fill="#ffffff"></path>
  </svg>

</section>
