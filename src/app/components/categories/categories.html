<section class="py-5">

    <div class="container">

        <div class="text-center mb-5">

            <h2 class="fw-bold">
                Popular Job Categories
            </h2>

            <p class="text-muted">
                Explore opportunities from the most in-demand industries.
            </p>

        </div>

        <div class="row g-4">

            <div
                class="col-lg-3 col-md-6"
                *ngFor="let category of categories">

                <div class="category-card">

                    <div class="icon">

                        <i
                        [class]="category.icon + ' text-' + category.color">
                        </i>

                    </div>

                    <h5 class="mt-3">

                        {{category.title}}

                    </h5>

                    <p class="text-muted">

                        {{category.jobs}} Open Jobs

                    </p>

                    <button class="btn btn-outline-primary btn-sm">

                        Explore

                    </button>

                </div>

            </div>

        </div>

    </div>

</section>
