<section class="automation-section">
  <p class="eyebrow">STREAMLINE PROCESSES. UNLOCK GROWTH.</p>
  <h2 class="section-title">Automation Solutions</h2>

  <div class="cards-grid">
    <div class="service-card" *ngFor="let service of services">
      <div class="card-face card-front">
        <div class="card-icon" [innerHTML]="service.icon"></div>
        <h3 class="card-title">{{ service.title }}</h3>
        <p class="card-desc">{{ service.description }}</p>
      </div>

      <div class="card-face card-back">
        <h3 class="card-title-back">{{ service.title }}</h3>
        <p class="card-desc-back">{{ service.description }}</p>

      </div>
    </div>
  </div>
</section>
