<section class="how-it-works-section">
  <h2 class="hiw-title">How it works</h2>
  <div class="hiw-underline">
    <span class="hiw-line"></span>
    <span class="hiw-dot"></span>
    <span class="hiw-line"></span>
  </div>

  <div class="hiw-grid">
    <div class="hiw-card" *ngFor="let card of cards">
      <div class="hiw-icon" [innerHTML]="card.icon"></div>
      <h3 class="hiw-card-title">{{ card.title }}</h3>
      <p class="hiw-card-desc">{{ card.description }}</p>
    </div>
  </div>
</section>
