<section class="why-choose">

  <!-- decorative diagonal line pattern, corners only -->
  <span class="pattern pattern-bottom-left" aria-hidden="true"></span>
  <span class="pattern pattern-top-right" aria-hidden="true"></span>

  <div class="container why-grid">

    <!-- Image with offset gradient ring -->
    <div class="image-col">
      <div class="circle-image">
        <img [src]="imageSrc" [alt]="imageAlt">
      </div>
    </div>

    <!-- Text content -->
    <div class="content-col">

      <div class="eyebrow">
        <span class="dash dash-short"></span>
        <span class="dash dash-long"></span>
        <span class="eyebrow-text">{{ eyebrow }}</span>
      </div>

      <h2 class="heading">{{ heading }}</h2>

      <p *ngFor="let para of paragraphs">{{ para }}</p>

    </div>

  </div>

</section>
