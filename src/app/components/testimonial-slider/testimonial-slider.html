<!-- Technology Index -->
<section class="tech-index-section py-5">
  <div class="container text-center">
    <span class="tech-tag">Technology Index</span>
    <h2 class="tech-heading">Technologies We Recruit For</h2>

    <div class="tech-grid">
      <div class="tech-item" *ngFor="let tech of techStack">
        <div class="tech-box">
          <img [src]="tech.logo" [alt]="tech.name" class="tech-logo">
        </div>
        <div class="tech-connector">
          <span class="tech-dot"></span>
        </div>
        <p class="tech-label">{{tech.name}}</p>
      </div>
    </div>
  </div>
</section>
