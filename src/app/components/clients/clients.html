<section class="clients-section">
  <div class="container">
    <p class="clients-label reveal-up" #revealEl>Trusted by leading organisations</p>

    <div class="clients-track-wrapper reveal-up" #revealEl>
      <div class="clients-track">
        <div class="client-logo" *ngFor="let client of loopedClients">
          <span>{{ client.name }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
